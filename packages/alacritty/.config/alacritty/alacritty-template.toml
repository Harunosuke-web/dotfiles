# Alacritty Configuration Template
# All available options with default values (commented out)
# Based on official documentation: https://alacritty.org/config-alacritty.html

# General Settings
# import = []                          # Import additional config files
# working_directory = "None"           # Shell's starting directory
# live_config_reload = true            # Live config reloading
# ipc_socket = true                    # Enable IPC messaging

# Environment Variables
# [env]
# TERM = "alacritty"                   # Terminal type

# Window Configuration
[window]
# dimensions = { columns = 0, lines = 0 }  # Window size (0 = use available space)
# position = "None"                    # Window position on startup
# padding = { x = 0, y = 0 }           # Blank space around window
# dynamic_padding = false              # Spread padding evenly
# decorations = "full"                 # Window decorations (full, none, transparent, buttonless)
# opacity = 1.0                        # Background transparency
# blur = false                         # Window background blur
# startup_mode = "Windowed"            # Window mode (Windowed, Maximized, Fullscreen, SimpleFullscreen)
# title = "Alacritty"                  # Window title
# dynamic_title = true                 # Allow terminal to change title
# class = { instance = "Alacritty", general = "Alacritty" }  # Window class
# decorations_theme_variant = "None"   # System theme variant override
# resize_increments = false            # Resize window by cell dimensions
# option_as_alt = "None"               # Option key behavior (None, OnlyLeft, OnlyRight, Both)

# Scrolling Configuration
[scrolling]
# history = 10000                      # Scrollback buffer lines
# multiplier = 3                       # Lines scrolled per scroll action

# Font Configuration
[font]
# size = 11.0                          # Font size

# [font.normal]
# family = "monospace"                 # Font family
# style = "Regular"                    # Font style

# [font.bold]
# family = "monospace"                 # Bold font family
# style = "Bold"                       # Bold font style

# [font.italic]
# family = "monospace"                 # Italic font family
# style = "Italic"                     # Italic font style

# [font.bold_italic]
# family = "monospace"                 # Bold italic font family
# style = "Bold Italic"                # Bold italic font style

# [font.offset]
# x = 0                                # Character spacing horizontal
# y = 0                                # Character spacing vertical

# [font.glyph_offset]
# x = 0                                # Glyph positioning horizontal
# y = 0                                # Glyph positioning vertical

# builtin_box_drawing = true           # Use built-in box drawing characters

# Color Configuration
[colors]
# draw_bold_text_with_bright_colors = false  # Use bright colors for bold text

# [colors.primary]
# background = "#1d1f21"               # Background color
# foreground = "#c5c8c6"               # Foreground color
# dim_foreground = "#828482"           # Dim foreground color
# bright_foreground = "None"           # Bright foreground color

# [colors.cursor]
# text = "CellBackground"              # Cursor text color
# cursor = "CellForeground"            # Cursor color

# [colors.vi_mode_cursor]
# text = "CellBackground"              # Vi mode cursor text color
# cursor = "CellForeground"            # Vi mode cursor color

# [colors.search.matches]
# foreground = "None"                  # Search matches foreground
# background = "None"                  # Search matches background

# [colors.search.focused_match]
# foreground = "None"                  # Focused match foreground
# background = "None"                  # Focused match background

# [colors.footer_bar]
# background = "None"                  # Search footer background
# foreground = "None"                  # Search footer foreground

# [colors.hints.start]
# foreground = "None"                  # Hint start foreground
# background = "None"                  # Hint start background

# [colors.hints.end]
# foreground = "None"                  # Hint end foreground
# background = "None"                  # Hint end background

# [colors.line_indicator]
# foreground = "None"                  # Line indicator foreground
# background = "None"                  # Line indicator background

# [colors.selection]
# text = "CellBackground"              # Selection text color
# background = "CellForeground"        # Selection background color

# [colors.normal]
# black = "#1d1f21"                    # Normal black
# red = "#cc6666"                      # Normal red
# green = "#b5bd68"                    # Normal green
# yellow = "#f0c674"                   # Normal yellow
# blue = "#81a2be"                     # Normal blue
# magenta = "#b294bb"                  # Normal magenta
# cyan = "#8abeb7"                     # Normal cyan
# white = "#c5c8c6"                    # Normal white

# [colors.bright]
# black = "#666666"                    # Bright black
# red = "#d54e53"                      # Bright red
# green = "#b9ca4a"                    # Bright green
# yellow = "#e7c547"                   # Bright yellow
# blue = "#7aa6da"                     # Bright blue
# magenta = "#c397d8"                  # Bright magenta
# cyan = "#70c0b1"                     # Bright cyan
# white = "#eaeaea"                    # Bright white

# [colors.dim]
# black = "#131415"                    # Dim black
# red = "#864343"                      # Dim red
# green = "#777c44"                    # Dim green
# yellow = "#9e824c"                   # Dim yellow
# blue = "#556a7d"                     # Dim blue
# magenta = "#75617b"                  # Dim magenta
# cyan = "#5b7d78"                     # Dim cyan
# white = "#828482"                    # Dim white

# Bell Configuration
[bell]
# animation = "Linear"                 # Visual bell animation (Ease, EaseOut, EaseOutSine, EaseOutQuad, EaseOutCubic, EaseOutQuart, EaseOutQuint, EaseOutExpo, EaseOutCirc, Linear)
# duration = 0                         # Animation duration in milliseconds
# color = "#ffffff"                    # Bell animation color
# command = "None"                     # Command to execute on bell

# Selection Configuration
[selection]
# semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"  # Word boundary characters
# save_to_clipboard = false           # Auto-save selection to clipboard

# Cursor Configuration
[cursor]
# vi_mode_style = "None"               # Vi mode cursor style (Block, Underline, Beam)
# blink_interval = 750                 # Cursor blink interval in milliseconds
# blink_timeout = 5                    # Stop blinking after seconds
# unfocused_hollow = true              # Hollow cursor when unfocused
# thickness = 0.15                     # Cursor thickness (0.0 - 1.0)

# [cursor.style]
# shape = "Block"                      # Cursor shape (Block, Underline, Beam)
# blinking = "Off"                     # Cursor blinking (Never, Off, On, Always)

# Terminal Configuration
[terminal]
# osc52 = "OnlyCopy"                   # OSC 52 support (Disabled, OnlyCopy, OnlyPaste, CopyPaste)

# Mouse Configuration
[mouse]
# hide_when_typing = false             # Hide mouse when typing
# bindings = []                        # Mouse button bindings

# [mouse.double_click]
# threshold = 300                      # Double click time threshold

# [mouse.triple_click]
# threshold = 300                      # Triple click time threshold

# Mouse Binding Reference:
# 
# Available Mouse Buttons:
# - "Left": Left mouse button
# - "Right": Right mouse button  
# - "Middle": Middle mouse button
# - "Back": Back mouse button (if available)
# - "Forward": Forward mouse button (if available)
#
# Available Actions for Mouse:
# - "PasteSelection": Paste primary selection
# - "Copy": Copy selection to clipboard
# - "Paste": Paste from clipboard
# - "ExpandSelection": Expand current selection
# - "ClearSelection": Clear selection
# - "ToggleViMode": Toggle Vi mode
#
# Example Mouse Bindings:
# bindings = [
#   { mouse = "Right", action = "PasteSelection" },
#   { mouse = "Middle", action = "PasteSelection" },
#   { mouse = "Left", mods = "Command", action = "Copy" },
# ]

# Keyboard Configuration
[keyboard]
# bindings = []                        # Key bindings

# Keyboard Binding Reference:
# 
# Available Keys:
# - Regular characters: "A", "B", "0", "1", etc.
# - Function keys: "F1", "F2", ..., "F24"
# - Arrow keys: "Up", "Down", "Left", "Right"
# - Special keys: "Space", "Tab", "Return", "Escape", "Back", "Delete"
# - Navigation: "Home", "End", "PageUp", "PageDown", "Insert"
# - Numpad: "NumpadEnter", "NumpadAdd", "NumpadSubtract", "NumpadMultiply", "NumpadDivide"
# - Numpad numbers: "Numpad0", "Numpad1", ..., "Numpad9"
# - Punctuation: "Period", "Comma", "Semicolon", "Quote", "Grave", etc.
# - Brackets: "LBracket", "RBracket"
# - Slashes: "Slash", "Backslash"
# - Equals/Minus: "Equals", "Minus"
#
# Available Modifiers (combine with "|"):
# - "Command" (macOS Cmd key)
# - "Control" (Ctrl key)
# - "Option" (macOS Option key)
# - "Super" (Windows key on Linux/Windows)
# - "Shift"
# - "Alt"
# Example: "Control|Shift", "Command|Option"
#
# Available Modes (combine with "|", negate with "~"):
# - "AppCursor": Application cursor mode
# - "AppKeypad": Application keypad mode
# - "Search": Search mode active
# - "Alt": Alt screen active
# - "Vi": Vi mode active
# Example: "~Vi", "Search|Vi", "~Search"
#
# Available Actions:
# Basic Actions:
# - "ReceiveChar": Allow character input (default behavior)
# - "None": Disable key binding
# - "Paste": Paste from clipboard
# - "Copy": Copy selection to clipboard
# - "PasteSelection": Paste from selection (Linux/BSD)
#
# Font Actions:
# - "IncreaseFontSize": Increase font size
# - "DecreaseFontSize": Decrease font size
# - "ResetFontSize": Reset font size to default
#
# Scrolling Actions:
# - "ScrollPageUp": Scroll up one page
# - "ScrollPageDown": Scroll down one page
# - "ScrollHalfPageUp": Scroll up half page
# - "ScrollHalfPageDown": Scroll down half page
# - "ScrollLineUp": Scroll up one line
# - "ScrollLineDown": Scroll down one line
# - "ScrollToTop": Scroll to top of history
# - "ScrollToBottom": Scroll to bottom of history
#
# Window Management Actions:
# - "Hide": Hide the window (macOS only)
# - "Minimize": Minimize the window
# - "Quit": Quit Alacritty
# - "ToggleFullscreen": Toggle fullscreen mode
# - "ToggleMaximized": Toggle maximized mode
# - "CreateNewWindow": Create new window
# - "SpawnNewInstance": Launch new Alacritty instance
#
# Vi Mode Actions:
# Movement:
# - "Up", "Down", "Left", "Right": Vi mode cursor movement
# - "First", "Last": Move to first/last column
# - "FirstOccupied": Move to first non-empty cell
# - "High", "Middle", "Low": Move to top/middle/bottom of screen
# - "SemanticLeft", "SemanticRight": Move by word boundaries
# - "SemanticLeftEnd", "SemanticRightEnd": Move to word ends
# - "WordLeft", "WordRight": Move by words
# - "WordLeftEnd", "WordRightEnd": Move to word ends
# - "Bracket": Jump to matching bracket
# - "SearchNext", "SearchPrevious": Navigate search results
# - "SearchStart", "SearchEnd": Go to search start/end
#
# Selection:
# - "ToggleNormalSelection": Toggle normal selection mode
# - "ToggleLineSelection": Toggle line selection mode
# - "ToggleBlockSelection": Toggle block selection mode
# - "ToggleSemanticSelection": Toggle semantic selection mode
#
# Search:
# - "SearchForward": Start forward search
# - "SearchBackward": Start backward search
# - "ClearSelection": Clear current selection
#
# Mode Control:
# - "ToggleViMode": Enter/exit Vi mode
# - "SearchFocusNext": Focus next search match
# - "SearchFocusPrevious": Focus previous search match
# - "SearchConfirm": Confirm search
# - "SearchCancel": Cancel search
# - "ClearLogNotice": Clear log notice
# - "ClearSelection": Clear selection
#
# Example Key Bindings:
# bindings = [
#   # Window management
#   { key = "N", mods = "Command", action = "SpawnNewInstance" },
#   { key = "Return", mods = "Command|Shift", action = "SpawnNewInstance" },
#   { key = "W", mods = "Command", action = "Quit" },
#   
#   # Font size
#   { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
#   { key = "Minus", mods = "Command", action = "DecreaseFontSize" },
#   { key = "0", mods = "Command", action = "ResetFontSize" },
#   
#   # Copy/Paste
#   { key = "C", mods = "Command", action = "Copy" },
#   { key = "V", mods = "Command", action = "Paste" },
#   
#   # Scrolling
#   { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
#   { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
#   { key = "Home", mods = "Shift", action = "ScrollToTop" },
#   { key = "End", mods = "Shift", action = "ScrollToBottom" },
#   
#   # Vi mode
#   { key = "Space", mods = "Shift|Control", action = "ToggleViMode" },
#   { key = "Escape", mode = "Vi", action = "ClearSelection" },
#   { key = "Y", mods = "Control", mode = "Vi", action = "ScrollLineUp" },
#   { key = "E", mods = "Control", mode = "Vi", action = "ScrollLineDown" },
#   
#   # Search
#   { key = "F", mods = "Command", action = "SearchForward" },
#   { key = "B", mods = "Command", action = "SearchBackward" },
#   
#   # Custom character sequences
#   { key = "L", mods = "Control", chars = "\x0c" },  # Send Ctrl+L (clear screen)
#   { key = "K", mods = "Command", chars = "\x0c" },   # Alternative clear
# ]

# Debug Configuration
[debug]
# render_timer = false                 # Display frame rendering time
# persistent_logging = false           # Keep logging after quit
# log_level = "Warn"                   # Log level (Off, Error, Warn, Info, Debug, Trace)
# print_events = false                 # Print received events
# highlight_damage = false             # Highlight damaged rects

# Hints Configuration
[hints]
# alphabet = "jfkdls;ahgurieowpq"      # Characters for hint labels
# enabled = []                         # Hint configurations

# Hints Reference:
# 
# Hints allow you to interact with text patterns in the terminal
# such as URLs, file paths, or custom regex patterns
#
# Available Hint Actions:
# - "Copy": Copy matched text to clipboard
# - "Paste": Paste matched text
# - "Select": Select matched text
# - "MoveViModeCursor": Move Vi mode cursor to match
#
# Example Hint Configurations:
# enabled = [
#   # URL hints
#   {
#     regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001f\u007f-\u009f<>\"\\s{-}\\^⟨⟩`]+",
#     hyperlinks = true,
#     action = "Copy",
#     post_processing = true,
#     binding = { key = "U", mods = "Control|Shift" },
#     mouse = { enabled = true, mods = "None" }
#   },
#   
#   # File path hints
#   {
#     regex = "(\\/.+):(\\d+):(\\d+)",
#     action = "Copy",
#     binding = { key = "F", mods = "Control|Shift" }
#   },
#   
#   # Hash/commit hints
#   {
#     regex = "[0-9a-f]{7,40}",
#     action = "Copy", 
#     binding = { key = "H", mods = "Control|Shift" }
#   }
# ]